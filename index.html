<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>パンダの大冒険</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background:#1a1a2e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh;
  font-family:"Trebuchet MS",sans-serif;
  color:#fff; user-select:none; -webkit-user-select:none;
}
/* ゲーム画面: 画面幅・高さどちらか短い方に合わせて最大化 */
#wrap {
  position:relative;
  /* 幅は画面幅100%、高さは画面高さから少し引く(スマホ横画面でボタン込みでも収まる余白) */
  width: min(100vw, calc(100vh * 960 / 540));
  height: min(100vh, calc(100vw * 540 / 960));
  max-width: 100vw;
  max-height: 100vh;
  border:4px solid #000;
  box-shadow:0 0 24px rgba(0,0,0,.6);
  flex-shrink:0;
}
/* PC(マウス操作・比較的大きい画面)ではプレイしやすいよう少し小さめの上限を設ける */
@media (pointer:fine) and (min-width:700px) {
  #wrap {
    max-width: 860px;
    max-height: 78vh;
  }
}
canvas { display:block; background:#5c94fc; image-rendering:pixelated; width:100%; height:100%; }
/* HUDはcanvas内左上に絶対配置 */
#hud {
  position:absolute; top:2%; left:2%;
  font-size:clamp(11px,2.2vw,18px); text-shadow:2px 2px 0 #000;
  display:flex; gap:clamp(8px,1.8vw,22px); flex-wrap:wrap;
  pointer-events:none;
}
#muteBtn {
  position:absolute; top:2%; right:2%;
  width:clamp(28px,4vw,40px); height:clamp(28px,4vw,40px);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(14px,2.2vw,20px);
  background:rgba(0,0,0,0.4); border-radius:50%;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
}
#overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,.72); text-align:center; font-size:clamp(16px,2.5vw,24px); gap:14px;
  padding-top:8%; box-sizing:border-box;
}
#overlay button {
  padding:10px 28px; font-size:clamp(14px,1.8vw,18px); border:none; border-radius:6px;
  background:#e63946; color:#fff; cursor:pointer; font-weight:bold;
}
#overlay button:hover { background:#ff5a64; }

/* 管理者モード: 目立たない小さなテキストリンク */
#adminModeBtn {
  position:absolute; bottom:6px; right:10px;
  font-size:10px; color:rgba(255,255,255,0.25);
  cursor:pointer; user-select:none; -webkit-user-select:none;
  letter-spacing:1px;
}
#adminModeBtn:hover { color:rgba(255,255,255,0.5); }

/* 管理者ログインモーダル */
#adminLoginModal, #stageSelectModal {
  display:none; position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85);
  align-items:center; justify-content:center;
  z-index:20;
}
.adminBox {
  background:#222; border:2px solid #444; border-radius:8px;
  padding:20px 24px; display:flex; flex-direction:column; align-items:center;
  max-width:90%;
}
#adminPassInput {
  padding:8px 10px; font-size:14px; border-radius:4px; border:1px solid #555;
  background:#111; color:#fff; width:180px; text-align:center;
}
#adminLoginError {
  display:none; color:#ff6666; font-size:12px; margin-top:6px;
}
.adminBtnRow { display:flex; gap:10px; margin-top:14px; }
.adminBtnRow button {
  padding:8px 18px; font-size:13px; border:none; border-radius:5px;
  background:#3a7d44; color:#fff; cursor:pointer; font-weight:bold;
}
.adminBtnRow button:hover { background:#4ea858; }
#adminCancelBtn { background:#555 !important; }
#adminCancelBtn:hover { background:#777 !important; }

/* ステージ選択グリッド */
#stageSelectGrid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  margin-bottom:12px;
}
.stageSelectBtn {
  padding:14px 10px; font-size:13px; border:none; border-radius:6px;
  background:#3a7d44; color:#fff; cursor:pointer; font-weight:bold;
  min-width:70px;
}
.stageSelectBtn:hover { background:#4ea858; }
#stageSelectCloseBtn {
  padding:8px 18px; font-size:13px; border:none; border-radius:5px;
  background:#555; color:#fff; cursor:pointer;
}
#stageSelectCloseBtn:hover { background:#777; }

/* 管理者モード中に表示される「ステージ選択に戻る」ボタン */
#backToSelectBtn {
  display:none; position:absolute; top:2%; right:2%;
  font-size:11px; padding:5px 10px; border-radius:4px;
  background:rgba(58,125,68,0.85); color:#fff; cursor:pointer;
  user-select:none; -webkit-user-select:none; z-index:15;
}
#backToSelectBtn:hover { background:rgba(78,168,88,0.95); }
/* タッチボタン */
#touchControls {
  display:none; position:absolute; left:0; right:0; bottom:0;
  justify-content:space-between; align-items:flex-end;
  padding:0 3% 3%; pointer-events:none;
}
#moveBtns { display:flex; gap:3%; pointer-events:none; }
#rightBtns { display:flex; gap:3%; pointer-events:none; align-items:flex-end; }
.touchBtn {
  width:clamp(44px,10vw,68px); height:clamp(44px,10vw,68px);
  background:rgba(230,57,70,.85); border:3px solid rgba(255,255,255,.9); border-radius:50%;
  color:#fff; font-size:clamp(16px,3.5vw,26px); font-weight:bold;
  display:flex; align-items:center; justify-content:center;
  touch-action:none; -webkit-touch-callout:none;
  -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 6px rgba(0,0,0,.5),inset 0 -3px 4px rgba(0,0,0,.25);
  transition:transform .05s,background .05s; flex-shrink:0; pointer-events:auto;
}
.touchBtn:active,.touchBtn.pressed { background:rgba(255,90,100,.95); transform:scale(.92); }
#btnJump { background:rgba(46,204,113,.85); }
#btnJump:active,#btnJump.pressed { background:rgba(78,224,138,.95); }
#btnFire { background:rgba(90,106,122,.85); display:none; }
#btnFire:active,#btnFire.pressed { background:rgba(120,136,152,.95); }

/* ボタン内アイコン(テキスト記号を使わずCSS図形で描画。iOSの虫眼鏡拡大を回避) */
.btnIcon {
  display:block; pointer-events:none;
  width:100%; height:100%;
  position:relative;
}
/* 左矢印: 三角形 */
.icon-left::before {
  content:''; position:absolute; top:50%; left:50%;
  width:0; height:0;
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-right:14px solid #fff;
  transform:translate(-40%,-50%);
}
/* 右矢印: 三角形 */
.icon-right::before {
  content:''; position:absolute; top:50%; left:50%;
  width:0; height:0;
  border-top:9px solid transparent;
  border-bottom:9px solid transparent;
  border-left:14px solid #fff;
  transform:translate(-60%,-50%);
}
/* ジャンプ: 上向きシェブロン(V字を逆さに2本重ね) */
.icon-jump::before, .icon-jump::after {
  content:''; position:absolute; left:50%;
  width:16px; height:16px;
  border-top:4px solid #fff; border-left:4px solid #fff;
  transform:translateX(-50%) rotate(45deg);
}
.icon-jump::before { top:38%; }
.icon-jump::after { top:56%; opacity:0.6; }
/* 手裏剣アイコン: 縁取り(黒い大きめの形)+本体(明るい色)の二重レイヤーで視認性を確保 */
.icon-fire {
  position: relative;
}
.icon-fire::before {
  content:''; position:absolute; top:50%; left:50%;
  width:32px; height:32px;
  transform:translate(-50%,-50%);
  background:#1a2530;
  clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
}
.icon-fire::after {
  content:''; position:absolute; top:50%; left:50%;
  width:24px; height:24px;
  transform:translate(-50%,-50%);
  background:#e8edf2;
  clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
}
@media (pointer:coarse) {
  #touchControls { display:flex; }
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hud">
    <div>❤️ <span id="lives">3</span></div>
    <div>🪙 <span id="coins">0</span></div>
    <div>STAGE <span id="stageNum">1</span></div>

    <div>💀 <span id="killCountEl">0</span>/20</div>
  </div>

  <div id="overlay">
    <div style="font-size:clamp(18px,3.5vw,30px);font-weight:bold;text-shadow:3px 3px 0 #000;letter-spacing:2px;max-width:90%;word-break:keep-all;">🐼 パンダの大冒険</div>
    <div style="font-size:clamp(11px,1.5vw,14px);color:#aaa;">← → 移動 / スペース ジャンプ / Z 手裏剣</div>

  </div>

      <div style="font-size:14px;color:#ccc;margin-bottom:8px;">管理者パスワード</div>

    </div>
    <div id="rightBtns">
      <div class="touchBtn" id="btnFire"><span class="btnIcon icon-fire"></span></div>
      <div class="touchBtn" id="btnJump"><span class="btnIcon icon-jump"></span></div>
    </div>
  </div>
</div>

<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TILE = 32;
const GRAVITY = 0.55;
const ESIZE = 40; // 敵の描画・判定サイズ(プレイヤーw26,h30より少し大きく)

// ===== Web Audio (効果音) =====
let audioCtx = null;
let audioUnlocked = false;

function getAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      return null;
    }
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
  return audioCtx;
}

// iOS Safari対策: 無音バッファを実際に再生してオーディオ経路を完全に開通させる
function unlockAudioContext() {
  const ac = getAudio();
  if (!ac || audioUnlocked) return;
  try {
    const buffer = ac.createBuffer(1, 1, 22050);
    const source = ac.createBufferSource();
    source.buffer = buffer;
    source.connect(ac.destination);
    if (source.start) source.start(0);
    else if (source.noteOn) source.noteOn(0);
    if (ac.state === 'suspended') ac.resume();
    audioUnlocked = true;
  } catch(e) {
    console.warn('Audio unlock failed:', e);
  }
}
function playSound(type) {
  try {
    const ac = getAudio();
    if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const now = ac.currentTime;
    if (type === 'jump') {
      o.type = 'square';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(600, now + 0.1);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'coin') {
      o.type = 'sine';
      o.frequency.setValueAtTime(800, now);
      o.frequency.exponentialRampToValueAtTime(1200, now + 0.06);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.start(now); o.stop(now + 0.12);
    } else if (type === 'stomp') {
      o.type = 'square';
      o.frequency.setValueAtTime(400, now);
      o.frequency.exponentialRampToValueAtTime(100, now + 0.12);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'damage') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);
    } else if (type === 'powerup') {
      o.type = 'sine';
      [300,350,400,500,600,700,800].forEach((f,i) => {
        o.frequency.setValueAtTime(f, now + i*0.06);
      });
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.start(now); o.stop(now + 0.5);
    } else if (type === 'fireball') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(600, now);
      o.frequency.exponentialRampToValueAtTime(300, now + 0.08);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o.start(now); o.stop(now + 0.1);
    } else if (type === 'clear') {
      [523,659,784,1047].forEach((f,i) => {
        const o2 = ac.createOscillator();
        const g2 = ac.createGain();
        o2.connect(g2); g2.connect(ac.destination);
        o2.type = 'sine'; o2.frequency.value = f;
        g2.gain.setValueAtTime(0.18, now+i*0.1);
        g2.gain.exponentialRampToValueAtTime(0.001, now+i*0.1+0.3);
        o2.start(now+i*0.1); o2.stop(now+i*0.1+0.3);
      });
      return;
    } else if (type === 'death') {
      o.type = 'square';
      [400,300,200,150,120].forEach((f,i) => {
        o.frequency.setValueAtTime(f, now+i*0.06);
      });
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o.start(now); o.stop(now + 0.4);
    }
  } catch(e) {}
}

// ===== BGM(スケジューラ方式のシンプルなループメロディ) =====
let bgmEnabled = true;
let bgmGain = null;
let bgmTimer = null;
let bgmStep = 0;
let bgmCurrentTrack = -1;

// 音名→周波数
const NOTE = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,
  'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,'B5':987.77,
  '-':0, // 休符
};

// ステージテーマ別の軽快なメロディ(音名の配列、1音=8分音符相当)
const bgmTracks = [
  // 昼: 明るいスキップメロディ
  ['C4','E4','G4','E4','C4','E4','G4','A4','G4','E4','C4','-','D4','F4','A4','F4'],
  // 地下: 少し不穏だが軽快
  ['C3','C3','D3','C3','G3','G3','A3','G3','C3','C3','E3','C3','F3','F3','G3','F3'],
  // 夜: 静かで少しミステリアス
  ['A3','-','C4','-','E4','-','C4','-','A3','-','D4','-','B3','-','E4','-'],
  // 砂漠: 中東風スケール感
  ['D4','F4','G4','A4','B4','A4','G4','F4','D4','-','A3','-','D4','F4','A4','-'],
  // 雪: 澄んだ高音メロディ
  ['E4','G4','B4','G4','E4','G4','B4','C5','B4','G4','E4','-','F4','A4','C5','A4'],
  // 城: 重厚で緊張感
  ['C3','G3','C4','G3','A3','-','A3','G3','F3','C4','F3','-','D3','A3','D4','-'],
];

function ensureBgmGain() {
  const ac = getAudio();
  if (!bgmGain) {
    bgmGain = ac.createGain();
    bgmGain.gain.value = 0.1; // 控えめだが聞き取れる音量
    bgmGain.connect(ac.destination);
  }
}

function playBgmNote(freq, ac, startTime, dur) {
  if (freq === 0) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'triangle';
  o.frequency.value = freq;
  o.connect(g); g.connect(bgmGain);
  g.gain.setValueAtTime(0.0001, startTime);
  g.gain.exponentialRampToValueAtTime(1, startTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur * 0.9);
  o.start(startTime);
  o.stop(startTime + dur);
}

function startBgm(trackIndex) {
  if (!bgmEnabled) return;
  if (bgmCurrentTrack === trackIndex && bgmTimer) return; // 同じ曲が既に再生中
  stopBgm();
  bgmCurrentTrack = trackIndex;
  try {
    const ac = getAudio();
    if (!ac) return;
    ensureBgmGain();
    const track = bgmTracks[trackIndex] || bgmTracks[0];
    const noteDur = 0.22; // 1音の長さ(秒)
    bgmStep = 0;
    const scheduleAhead = 4; // 何音先まで予約するか

    function scheduler() {
      if (!bgmEnabled) return;
      const ac2 = getAudio();
      if (!ac2) return;
      const now = ac2.currentTime;
      for (let i=0; i<scheduleAhead; i++) {
        const idx = (bgmStep + i) % track.length;
        const noteName = track[idx];
        const freq = NOTE[noteName] || 0;
        const t = now + i*noteDur;
        playBgmNote(freq, ac2, t, noteDur);
      }
      bgmStep = (bgmStep + scheduleAhead) % track.length;
    }
    scheduler();
    bgmTimer = setInterval(scheduler, noteDur * scheduleAhead * 1000);
  } catch(e) {}
}

function stopBgm() {
  if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
  bgmCurrentTrack = -1;
}

function toggleBgm() {
  bgmEnabled = !bgmEnabled;
  if (!bgmEnabled) stopBgm();
  else if (gameState === 'playing') startBgm(stageIndex);
  return bgmEnabled;
}

// ===== HUD elements =====
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const startBtn = document.getElementById('startBtn');
const livesEl = document.getElementById('lives');
const coinsEl = document.getElementById('coins');
const stageNumEl = document.getElementById('stageNum');
const powerEl = document.getElementById('powerStatus');
const killCountEl = document.getElementById('killCountEl');

// ===== ステージ定義 =====
const stagesData = [
[
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"................................?..................................................B...................+.............................B.........................B............................................................+..................B..................?..F........",
".................................................C...............##....................................................................................................................................CCCC.........CCCC...CCC..##...................####.....CCC.CCC.........",
"..P..........E................E......E..........E......E...................E.....E..................E....K.........*.......E..............E.....E..........E...................K...........K.......E.....................E................E.......K..........E................",
"#####################..####################...###################..######################....###############....###############...###################....###############...###################..################..##############..###################....#################...."
],
[
"####......########......########......########......########......########......########......########......########......########......########......########......########......########......########......########......########......########......########......########",
"....CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........CCCC..........",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..........+........................................+...............B........?.............!...............?..........B.........B.................B................................................................................................................F...........",
".........................................###.................................CC.C..........C.CC...###........CCCC.......###..............................................C...###......CCC................................................C.C..................................",
"..P.........*............J.....E......E.........E..............J.....E.........J............E................................J.....E.........J........J..........E........J..............E......E..............J......J...................J....E........E.....................",
"##################....###################...###############..######################...############...###################...############....#################..###############...######################....######################....###############...#################......."
],
[
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",
"..............................................................................................................................................................................................................................................................................",

// ===== ステージパース =====
function parseStage(rows) {
  const tiles=[], coinsTiles=[], enemies=[], items=[];
  let goal=null, startX=64, startY=0;
  for (let y=0;y<rows.length;y++) {
    const row=rows[y];
    for (let x=0;x<row.length;x++) {
      const ch=row[x], px=x*TILE, py=y*TILE;
      if (ch==='#') tiles.push({x:px,y:py,type:'block'});
      else if (ch==='?') tiles.push({x:px,y:py,type:'coinblock',used:false});
      else if (ch==='!') tiles.push({x:px,y:py,type:'itemblock',used:false,itemType:'mushroom'});
      else if (ch==='+') tiles.push({x:px,y:py,type:'itemblock',used:false,itemType:'flower'});
      else if (ch==='B') tiles.push({x:px,y:py,type:'brick'});
      else if (ch==='^') tiles.push({x:px,y:py,type:'spike'});
      else if (ch==='W') tiles.push({x:px,y:py,type:'bossWall'});
      else if (ch==='C') coinsTiles.push({x:px+TILE/2,y:py+TILE/2,taken:false});
      else if (ch==='E') enemies.push({
        x:px, y:py-TILE, vx:-1.3, vy:0, alive:true, squished:0, kind:'goomba',
      });
      else if (ch==='K') enemies.push({
        x:px, y:py-TILE, vx:-2.2, vy:0, alive:true, squished:0, kind:'koopa',
      });
      else if (ch==='J') enemies.push({
        x:px, y:py-TILE, vx:-1.0, vy:0, alive:true, squished:0, kind:'jumper',
        jumpTimer: Math.floor(Math.random()*60),
      });
      else if (ch==='S') enemies.push({
        x:px, y:py-TILE, vx:0, vy:0, alive:true, squished:0, kind:'shooter',
        shootTimer: 60 + Math.floor(Math.random()*60), facing:-1,
      });
      else if (ch==='X') enemies.push({
        x:px, y:py-TILE*2, vx:-2.2, vy:0, alive:true, squished:0, kind:'boss',
        hp:16, maxHp:16, shootTimer:70, hitFlash:0, phase:0, attackPattern:0,
        homeX:px, // 初期位置(行動範囲の中心として使う)
      });
      else if (ch==='M') items.push({x:px,y:py-TILE,type:'mushroom',taken:false,vx:1.2,vy:0,baseY:py-TILE});
      else if (ch==='$') items.push({x:px,y:py-TILE,type:'flower',taken:false,vx:0,vy:0,baseY:py-TILE});
      else if (ch==='*') items.push({x:px,y:py-TILE,type:'star',taken:false,vx:1.6,vy:0,baseY:py-TILE});
      else if (ch==='F') goal={x:px,y:py-TILE*3};
      else if (ch==='P') { startX=px; startY=py-TILE; }
    }
  }
  return {tiles,coinsTiles,enemies,items,goal,startX,startY,widthPx:rows[0].length*TILE};
}

function loadStage(i) {
  world = parseStage(stagesData[i]);
  player.x=world.startX; player.y=world.startY;
  player.vx=0; player.vy=0; player.invuln=0; player.jumpsLeft=2;
  player.deadAnim=0;
  fireballs=[];
  enemyProjectiles=[];
  camera.x=0;
  stageNumEl.textContent = i+1;
  startBgm(i);
}

// ===== 衝突 =====
function rectsOverlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// 指定矩形とソリッドタイルが当たっているか判定、当たったタイルを返す
function solidTilesHit(rect) {
  return world.tiles.filter(t => t.type!=='spike' &&
    rectsOverlap(rect,{x:t.x,y:t.y,w:TILE,h:TILE}));
}

// ===== 更新 =====
function update() {
  if (gameState!=='playing') return;

  // 死亡演出中(deadAnim>0)は物理をスキップしてアニメだけ
  if (player.deadAnim>0) {
    player.deadAnim--;
    player.y += player.vy;
    player.vy += GRAVITY;
    if (player.deadAnim<=0) {
      lives--;
      livesEl.textContent = lives;
      if (lives<=0) { stopBgm(); gameState='gameover'; showOverlay('ゲームオーバー','もう一度プレイ'); }
      else { respawn(); }
    }
    return;
  }

  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const jumpKey = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
  const fireKey = keys['KeyZ'] || keys['KeyX'];

  // 走行
  const accel = 1.0, maxSpeed = 5.2;
  const friction = player.onGround ? 0.80 : 0.88;
  if (left && !right)  { player.vx -= accel; player.facing=-1; }
  else if (right && !left) { player.vx += accel; player.facing= 1; }
  else { player.vx *= friction; if (Math.abs(player.vx)<0.05) player.vx=0; }
  player.vx = Math.max(-maxSpeed, Math.min(maxSpeed, player.vx));

  // ジャンプ
  if (jumpKey && player.onGround) {
    player.vy=-10.8; player.onGround=false; player.jumpsLeft=1;
    player.jumpKeyHeld=true; playSound('jump');
  } else if (jumpKey && !player.jumpKeyHeld && player.jumpsLeft>0) {
    player.vy=-9.5; player.jumpsLeft--;
    player.jumpKeyHeld=true;
    spawnParticles(player.x+13,player.y+player.h,'#ffffff');
    playSound('jump');
  }
  if (!jumpKey) player.jumpKeyHeld=false;
  if (!jumpKey && player.vy<-3.5) player.vy=-3.5;

  // ファイアボール発射
  if (fireKey && !keys['_firePrev'] && player.power==='fire' && fireballs.length<3) {
    fireballs.push({
      x:player.x + (player.facing>0?player.w:0),
      y:player.y+player.h/2-4,
      vx:player.facing*8, vy:-3,
      alive:true, bounces:0,
    });
    playSound('fireball');
  }
  keys['_firePrev'] = fireKey;

  // 重力
  player.vy += GRAVITY;
  if (player.vy>14) player.vy=14;

  // X移動と壁衝突
  player.x += player.vx;
  if (player.x<0) player.x=0;
  if (player.x+player.w>world.widthPx) player.x=world.widthPx-player.w;
  for (const t of solidTilesHit({x:player.x,y:player.y,w:player.w,h:player.h})) {
    if (player.vx>0) player.x=t.x-player.w;
    else if (player.vx<0) player.x=t.x+TILE;
    else player.x = (player.x+player.w/2 < t.x+TILE/2) ? t.x-player.w : t.x+TILE;
    player.vx=0;
  }

  // Y移動と床/天井衝突
  player.y += player.vy;
  player.onGround=false;
  for (const t of solidTilesHit({x:player.x,y:player.y,w:player.w,h:player.h})) {
    if (player.vy>0) {
      player.y=t.y-player.h; player.vy=0;
      player.onGround=true; player.jumpsLeft=2;
    } else if (player.vy<0) {
      player.y=t.y+TILE; player.vy=0;
      hitBlockFromBelow(t);
    }
  }

  // 穴
  if (player.y>H+100) { startDeathAnim(); return; }

  // トゲ
  for (const t of world.tiles) {
    if (t.type!=='spike') continue;
    if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},
                     {x:t.x,y:t.y+10,w:TILE,h:TILE-10}) && player.invuln<=0) {
      takeDamage(true); return;
    }
  }

  // コイン
  for (const c of world.coinsTiles) {
    if (c.taken) continue;
    if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},
                     {x:c.x-8,y:c.y-8,w:16,h:16})) {
      c.taken=true; coins++; coinsEl.textContent=coins;
      spawnParticles(c.x,c.y,'#ffd54a');
      floatTexts.push({x:c.x,y:c.y,text:'+1',life:40,color:'#ffd54a'});
      playSound('coin');
      if (coins>0 && coins%20===0) {
        lives++; livesEl.textContent=lives; playSound('powerup');
        floatTexts.push({x:c.x,y:c.y-20,text:'1UP!',life:70,color:'#4ee08a'});
      }
    }
  }

  // 敵 (重力あり・種類別)
  // 同一フレーム内で複数の敵と同時接触した際、1体目の処理でプレイヤーのvy/y座標が
  // 変化して2体目の判定基準が狂わないよう、フレーム開始時点の状態を固定して使う
  const frameStartVy = player.vy;
  const frameStartBottom = player.y + player.h;

  // --- パス1: 各敵の物理演算(移動・重力・攻撃)を先に全部処理する ---
  for (const e of world.enemies) {
    if (!e.alive) continue;
    if (e.squished>0) { e.squished--; if(e.squished===0) e.alive=false; continue; }

    const eSize = e.kind==='boss' ? BSIZE : ESIZE;

    // ジャンパーはタイマーでジャンプ
    if (e.kind==='jumper') {
      e.jumpTimer = (e.jumpTimer||0) - 1;
      if (e.jumpTimer<=0 && e.vy===0) {
        e.vy = -9;
        e.jumpTimer = 80 + Math.floor(Math.random()*40);
      }
    }

    // シューター: その場に留まり、プレイヤーの方向を向いて定期的に弾を撃つ
    if (e.kind==='shooter') {
      e.facing = (player.x < e.x) ? -1 : 1;
      e.shootTimer--;
      if (e.shootTimer<=0) {
        e.shootTimer = 60 + Math.floor(Math.random()*30);
        enemyProjectiles.push({
          x: e.x + eSize/2, y: e.y + eSize/2,
          vx: e.facing*8, vy: 0, alive:true, kind:'rock', noGravity:true,
        });
        playSound('fireball');
      }
    }

    // ボス: 歩き回りつつ定期的に複数弾を放つ
    if (e.kind==='boss') {
      e.shootTimer--;
      if (e.hitFlash>0) e.hitFlash--;
      // 体力が半分以下になると攻撃頻度が上がる(怒りモード)
      const enraged = e.hp <= e.maxHp/2;
      if (e.shootTimer<=0) {
        e.shootTimer = (enraged ? 55 : 80) + Math.floor(Math.random()*30);
        const dir = (player.x < e.x) ? -1 : 1;
        e.attackPattern = (e.attackPattern + 1) % 2;
        if (e.attackPattern === 0) {
          // 3way拡散弾(重力の影響を受けない直進弾に変更、速度も強化)
          for (const vy of [-3,0,3]) {
            enemyProjectiles.push({
              x: e.x+eSize/2, y: e.y+eSize/2,
              vx: dir*6, vy, alive:true, kind:'fireboss', noGravity:true,
            });
          }
        } else {
          // プレイヤーを直接狙う単発の高速弾
          const dx = (player.x+player.w/2) - (e.x+eSize/2);
          const dy = (player.y+player.h/2) - (e.y+eSize/2);
          const dist = Math.max(1, Math.hypot(dx,dy));
          enemyProjectiles.push({
            x: e.x+eSize/2, y: e.y+eSize/2,
            vx: (dx/dist)*7.5, vy: (dy/dist)*7.5, alive:true, kind:'fireboss', noGravity:true,
          });
        }
        playSound('fireball');
      }
    }

    // 重力(シューターは重力の影響を受けない=固定砲台)
    if (e.kind!=='shooter') {
      e.vy += GRAVITY;
      if (e.vy>14) e.vy=14;
      e.y += e.vy;
      // 床着地
      for (const t of world.tiles) {
        if (t.type==='spike') continue;
        const eb={x:e.x,y:e.y,w:eSize,h:eSize};
        if (rectsOverlap(eb,{x:t.x,y:t.y,w:TILE,h:TILE}) && e.vy>=0) {
          e.y=t.y-eSize; e.vy=0;
        }
      }
    }

    // 横移動(シューターは移動しない)
    if (e.kind!=='shooter') {
      e.x += e.vx;
      // 壁で反転
      for (const t of world.tiles) {
        if (t.type==='spike') continue;
        const eb={x:e.x,y:e.y,w:eSize,h:eSize};
        if (rectsOverlap(eb,{x:t.x,y:t.y,w:TILE,h:TILE})) { e.vx*=-1; e.x+=e.vx*2; break; }
      }
      // 崖で反転(koopaは崖から落ちる)
      const footY = e.y+eSize;
      const aheadX = e.x+(e.vx>0?eSize:-2);
      const hasFloor = world.tiles.some(t=>t.type!=='spike'&&
        t.x<=aheadX&&aheadX<t.x+TILE&&Math.abs(t.y-footY)<8);
      if (!hasFloor && e.vy===0 && e.kind!=='boss') e.vx*=-1;

      // ボスは初期位置(homeX)から離れすぎたら強制的に反転(アリーナ内を往復させる)
      if (e.kind==='boss' && e.homeX!==undefined) {
        if (e.x < e.homeX - 40 && e.vx < 0) e.vx = Math.abs(e.vx);
        if (e.x > e.homeX + 200 && e.vx > 0) e.vx = -Math.abs(e.vx);
      }
    }
  }

  // --- パス2: プレイヤーとの衝突を全敵ぶん収集(まだ何も処理しない) ---
  const collisions = [];
  let anyStompThisFrame = false;
  for (const e of world.enemies) {
    if (!e.alive || e.squished>0) continue;
    const eSize = e.kind==='boss' ? BSIZE : ESIZE;
    const eb2={x:e.x+6,y:e.y+6,w:eSize-12,h:eSize-10};
    const pb={x:player.x,y:player.y,w:player.w,h:player.h};
    if (player.invuln<=0 && rectsOverlap(pb,eb2)) {
      const stomping = frameStartVy>-2 && frameStartBottom < (e.y + eSize*0.75);
      if (stomping) anyStompThisFrame = true;
      collisions.push({e, eSize, stomping});
    }
  }

  // --- パス3: 収集した衝突を実際に処理する(踏みつけ成立が1つでもあればダメージは無効) ---
  for (const {e, eSize, stomping} of collisions) {
    if (!e.alive) continue; // 既に他の処理で消えている場合はスキップ
    if (e.kind==='boss') {
      if (stomping) {
        e.hp--; e.hitFlash=10;
        player.vy=-9;
        spawnParticles(e.x+eSize/2, e.y+eSize/2, '#ff3355');
        floatTexts.push({x:e.x+eSize/2,y:e.y,text:e.hp>0?'HIT!':'DOWN!',life:50,color:'#ff5555'});
        playSound('stomp');
        if (e.hp<=0) {
          e.alive=false;
          spawnParticles(e.x+eSize/2, e.y+eSize/2, '#ffd54a', 30);
          floatTexts.push({x:e.x+eSize/2,y:e.y-20,text:'5000',life:80,color:'#ffd54a'});
          registerKill(e.x+eSize/2, e.y);
          playSound('clear');
          removeBossWalls();
        }
      } else if (player.starTimer>0) {
        e.alive=false;
        spawnParticles(e.x+eSize/2, e.y+eSize/2, '#ffd54a', 30);
        registerKill(e.x+eSize/2, e.y);
        removeBossWalls();
      } else if (!anyStompThisFrame) {
        takeDamage(false); return;
      }
    } else if (stomping || player.starTimer>0) {
      e.squished=12; e.vx=0;
      player.vy=-8;
      spawnParticles(e.x+eSize/2, e.y+eSize/2, '#ff7b54');
      floatTexts.push({x:e.x+eSize/2,y:e.y,text:'100',life:50,color:'#fff'});
      playSound('stomp');
      registerKill(e.x+eSize/2, e.y);
    } else if (!anyStompThisFrame) {
      takeDamage(false); return;
    }
  }

  // 敵の弾(遠距離攻撃)
  for (const ep of enemyProjectiles) {
    if (!ep.alive) continue;
    if (!ep.noGravity) ep.vy += GRAVITY * 0.5;
    ep.x += ep.vx; ep.y += ep.vy;
    // 地形に当たったら消える
    for (const t of world.tiles) {
      if (t.type==='spike') continue;
      if (rectsOverlap({x:ep.x-5,y:ep.y-5,w:10,h:10},{x:t.x,y:t.y,w:TILE,h:TILE})) {
        ep.alive=false; break;
      }
    }
    // 画面外(広めの余裕を持たせて、遠くまで飛ぶ弾が早期に消えないようにする)
    if (ep.x<camera.x-100||ep.x>camera.x+W+100||ep.y>H+50||ep.y<-50) { ep.alive=false; continue; }
    // プレイヤーに命中
    if (player.invuln<=0 && player.starTimer<=0 &&
        rectsOverlap({x:ep.x-9,y:ep.y-9,w:18,h:18},{x:player.x,y:player.y,w:player.w,h:player.h})) {
      ep.alive=false;
      takeDamage(false);
    }
  }
  enemyProjectiles = enemyProjectiles.filter(ep=>ep.alive);

  // ファイアボール
  for (const fb of fireballs) {
    if (!fb.alive) continue;
    fb.vy += GRAVITY * 0.7;
    fb.x += fb.vx; fb.y += fb.vy;
    // 床バウンド
    for (const t of world.tiles) {
      if (t.type==='spike') continue;
      const tb={x:t.x,y:t.y,w:TILE,h:TILE};
      const fbrect={x:fb.x-5,y:fb.y-5,w:10,h:10};
      if (rectsOverlap(fbrect,tb)) {
        if (fb.vy>0) { fb.y=t.y-5; fb.vy=-Math.abs(fb.vy)*0.6; fb.bounces++; }
        else { fb.alive=false; break; }
        if (fb.bounces>3) { fb.alive=false; break; }
      }
    }
    // 画面外
    if (fb.x<camera.x-20||fb.x>camera.x+W+20||fb.y>H+50) { fb.alive=false; continue; }
    // 敵に命中
    for (const e of world.enemies) {
      if (!e.alive||e.squished>0) continue;
      const eSize = e.kind==='boss' ? BSIZE : ESIZE;
      if (rectsOverlap({x:fb.x-6,y:fb.y-6,w:12,h:12},{x:e.x,y:e.y,w:eSize,h:eSize})) {
        fb.alive=false;
        if (e.kind==='boss') {
          e.hp--; e.hitFlash=10;
          spawnParticles(e.x+eSize/2,e.y+eSize/2,'#a0c8d8');
          floatTexts.push({x:e.x+eSize/2,y:e.y,text:e.hp>0?'HIT!':'DOWN!',life:50,color:'#a0c8d8'});
          playSound('stomp');
          if (e.hp<=0) {
            e.alive=false;
            spawnParticles(e.x+eSize/2,e.y+eSize/2,'#ffd54a',30);
            floatTexts.push({x:e.x+eSize/2,y:e.y-20,text:'5000',life:80,color:'#ffd54a'});
            registerKill(e.x+eSize/2, e.y);
            playSound('clear');
            removeBossWalls();
          }
        } else {
          e.squished=12; e.vx=0;
          spawnParticles(e.x+eSize/2,e.y+eSize/2,'#a0c8d8');
          floatTexts.push({x:e.x+eSize/2,y:e.y,text:'200',life:50,color:'#a0c8d8'});
          playSound('stomp');
          registerKill(e.x+eSize/2, e.y);
        }
        break;
      }
    }
  }
  fireballs = fireballs.filter(fb=>fb.alive);

  // アイテム
  for (const it of world.items) {
    if (it.taken) continue;
    if (it.type==='flower') {
      // フラワーはブロックから上に押し出されて静止
      if (it.popping) { it.y-=1.2; if(it.y<=it.baseY){it.y=it.baseY;it.popping=false;} }
    } else {
      if (it.popping) {
        // ブロックからじわっと上に押し出し
        it.y-=1.2;
        if(it.y<=it.baseY){
          it.y=it.baseY;
          it.popping=false;
          // 押し出し完了したらブロックの横端の外に即ずらして落下開始
          it.x += it.vx > 0 ? TILE : -4;
          it.vy=0;
        }
      } else {
        // 重力で落下しながら横移動
        it.vy+=GRAVITY; if(it.vy>12)it.vy=12;
        it.y+=it.vy;
        let landed=false;
        for (const t of world.tiles) {
          if (t.type==='spike') continue;
          if (rectsOverlap({x:it.x,y:it.y,w:TILE-4,h:TILE-2},{x:t.x,y:t.y,w:TILE,h:TILE})&&it.vy>=0) {
            it.y=t.y-(TILE-2); it.vy=0; landed=true;
          }
        }
        it.x+=it.vx;
        // 壁で反転
        for (const t of world.tiles) {
          if (t.type==='spike') continue;
          if (rectsOverlap({x:it.x,y:it.y,w:TILE-4,h:TILE-2},{x:t.x,y:t.y,w:TILE,h:TILE})) {
            it.vx*=-1; it.x+=it.vx>0?3:-3; break;
          }
        }
        // 崖端で反転
        if (landed) {
          const footY2=it.y+TILE-2, aheadX2=it.x+(it.vx>0?TILE:-2);
          if(!world.tiles.some(t=>t.type!=='spike'&&t.x<=aheadX2&&aheadX2<t.x+TILE&&Math.abs(t.y-footY2)<8))
            it.vx*=-1;
        }
      }
    }
    if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h},
                     {x:it.x,y:it.y,w:TILE-4,h:TILE-2})) {
      it.taken=true; applyItem(it.type);
    }
  }

  // ゴール
  if (world.goal && player.x+player.w>world.goal.x) { stageClear(); return; }

  // カメラ(少し先を見せる)
  const targetCamX = player.x - W*0.38 + (player.facing>0?40:-40);
  camera.x += (targetCamX - camera.x) * 0.12;
  camera.x = Math.max(0, Math.min(camera.x, world.widthPx-W));

  if (player.invuln>0) player.invuln--;
  if (player.starTimer>0) player.starTimer--;

  updateParticles();
  updateFloatTexts();
  updateBounceBlocks();
}

function startDeathAnim() {
  player.vy=-10; player.vx=0;
  player.deadAnim=80;
  player.onGround=false;
  playSound('death');
}

function takeDamage(fromTrap) {
  if (player.starTimer>0||player.invuln>0) return;
  if (player.power!=='small') {
    player.power='small'; player.h=BASE_H;
    player.invuln=90;
    spawnParticles(player.x+13,player.y+10,'#ffffff');
    playSound('damage'); return;
  }
  startDeathAnim();
}

function respawn() {
  loadStage(stageIndex); // 敵・コイン・アイテムブロックも含めてステージを完全に初期状態へ戻す
  player.power = 'small'; player.h = BASE_H; // ミス後は必ずsmallに戻す
  player.invuln = 80; // ミス直後の無敵時間は維持
}

function registerKill(x, y) {
  killCount++;
  killCountEl.textContent = killCount % KILLS_PER_1UP;
  if (killCount % KILLS_PER_1UP === 0) {
    lives++;
    livesEl.textContent = lives;
    playSound('powerup');
    floatTexts.push({x, y: y-16, text:'1UP!', life:70, color:'#4ee08a'});
  }
}

function applyItem(type) {
  if (type==='mushroom') {
    if (player.power==='small') {
      player.power='big'; player.y-=(BIG_H-BASE_H); player.h=BIG_H;
    }
    spawnParticles(player.x+13,player.y,'#ffe08a');
    playSound('powerup');
  } else if (type==='flower') {
    player.power='fire';
    if (player.h===BASE_H) { player.y-=(BIG_H-BASE_H); player.h=BIG_H; }
    spawnParticles(player.x+13,player.y,'#ff6b6b');
    playSound('powerup');
  } else if (type==='star') {
    player.starTimer=480;
    spawnParticles(player.x+13,player.y,'#fff176');
    playSound('powerup');
  }
}

function removeBossWalls() {
  world.tiles = world.tiles.filter(t => t.type !== 'bossWall');
}

function hitBlockFromBelow(t) {
  if (t.type==='coinblock'&&!t.used) {
    t.used=true; coins++; coinsEl.textContent=coins;
    spawnParticles(t.x+16,t.y,'#ffd54a');
    floatTexts.push({x:t.x+16,y:t.y-10,text:'+1',life:40,color:'#ffd54a'});
    bounceBlocks.push({x:t.x,y:t.y,offset:0,dir:-1,blockType:'itemBlock'});
    playSound('coin');
  } else if (t.type==='itemblock'&&!t.used) {
    t.used=true;
    bounceBlocks.push({x:t.x,y:t.y,offset:0,dir:-1,blockType:'itemBlock'});
    world.items.push({
      x:t.x, y:t.y, type:t.itemType, taken:false,
      vx:t.itemType==='flower'?0:1.2, vy:0, baseY:t.y-TILE, popping:true,
    });
    spawnParticles(t.x+16,t.y,t.itemType==='flower'?'#f0d060':'#e8722c');
    playSound('powerup');
  } else if (t.type==='brick') {
    bounceBlocks.push({x:t.x,y:t.y,offset:0,dir:-1,blockType:'brick'});
    playSound('coin');
  } else if ((t.type==='coinblock'||t.type==='itemblock')&&t.used) {
    bounceBlocks.push({x:t.x,y:t.y,offset:0,dir:-1,small:true,blockType:'itemBlock'});
  }
}

function updateBounceBlocks() {
  for (const b of bounceBlocks) {
    b.offset+=b.dir*3; if(b.offset<-8)b.dir=1; if(b.offset>=0)b.offset=0;
  }
  bounceBlocks=bounceBlocks.filter(b=>!(b.offset===0&&b.dir===1));
}

function spawnParticles(x,y,color,n=8) {
  for (let i=0;i<n;i++) {
    particles.push({x,y,color,
      vx:(Math.random()-.5)*5, vy:-Math.random()*5-1, life:35});
  }
}
function updateParticles() {
  for (const p of particles) { p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life--; }
  particles=particles.filter(p=>p.life>0);
}
function updateFloatTexts() {
  for (const ft of floatTexts) { ft.y-=0.8; ft.life--; }
  floatTexts=floatTexts.filter(ft=>ft.life>0);
}

function stageClear() {
  playSound('clear');
  stopBgm();
  if (stageIndex<stagesData.length-1) {
    gameState='paused-clear'; stageClearTimer=100;

// ===== 管理者モード =====
// パスワードそのものではなく、SHA-256ハッシュ値だけをコードに埋め込む。
// (完全な防御ではないが、コードを読んだだけでは元のパスワードは分からない)
const ADMIN_PASS_HASH = 'bd07f4e708ba58ba9ba9b5d8141d76836270caca0cd026dca96ed2f1dee080e0';
let isAdminMode = false;

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const adminModeBtn = document.getElementById('adminModeBtn');
const adminLoginModal = document.getElementById('adminLoginModal');
const adminPassInput = document.getElementById('adminPassInput');
const adminLoginError = document.getElementById('adminLoginError');
const adminLoginBtn = document.getElementById('adminLoginBtn');
const adminCancelBtn = document.getElementById('adminCancelBtn');
const stageSelectModal = document.getElementById('stageSelectModal');

adminModeBtn.addEventListener('click', () => {
  adminPassInput.value = '';
  adminLoginError.style.display = 'none';
  adminLoginModal.style.display = 'flex';
  adminPassInput.focus();
});

adminCancelBtn.addEventListener('click', () => {
  adminLoginModal.style.display = 'none';
});

async function attemptAdminLogin() {
  const input = adminPassInput.value;
  const hash = await sha256Hex(input);
  if (hash === ADMIN_PASS_HASH) {
    isAdminMode = true;
    adminLoginModal.style.display = 'none';
    unlockAudioContext();
    openStageSelect();
  } else {
    adminLoginError.style.display = 'block';
  }
}
adminLoginBtn.addEventListener('click', attemptAdminLogin);
adminPassInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptAdminLogin();
});

// どんなユーザー操作でも一度だけAudioContextを確実に解放する(iOS/Android自動再生ポリシー対策)
// どんなユーザー操作でも一度だけAudioContextを確実に解放する(iOS/Android自動再生ポリシー対策)
function handleFirstInteraction() {
  unlockAudioContext();
  ['pointerdown','touchstart','keydown','click'].forEach(ev =>
    window.removeEventListener(ev, handleFirstInteraction));
}
['pointerdown','touchstart','keydown','click'].forEach(ev =>
  window.addEventListener(ev, handleFirstInteraction, {once:false}));
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

// タッチ: pointercapture方式でスライドしても反応が外れない
function bindTouch(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    keys[code]=true; el.classList.add('pressed');
  });
  el.addEventListener('pointerup', e => {
    e.preventDefault();
    keys[code]=false; el.classList.remove('pressed');
  });
  el.addEventListener('pointercancel', e => {
    keys[code]=false; el.classList.remove('pressed');
  });
}
bindTouch('btnLeft','ArrowLeft');
bindTouch('btnRight','ArrowRight');
bindTouch('btnJump','Space');
bindTouch('btnFire','KeyZ');

// ===== 描画 =====
function draw() {
  ctx.clearRect(0,0,W,H);

  const theme = stageThemes[stageIndex] || stageThemes[0];

  // 背景グラデーション(テーマ別)
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, theme.sky[0]); grad.addColorStop(1, theme.sky[1]);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // 夜ステージ: 星
  if (theme.stars) {
    ctx.fillStyle='rgba(255,255,255,0.8)';
    for (let i=0;i<40;i++) {
      const sx=((i*137.5)%800), sy=((i*97.3)%120);
      const twinkle = 0.4 + 0.6*Math.abs(Math.sin(Date.now()/800+i));
      ctx.globalAlpha=twinkle;
      ctx.fillRect(sx,sy,2,2);
    }
    ctx.globalAlpha=1;
  }

  // 遠景(テーマ別)
  ctx.fillStyle = theme.mountain;
  if (theme.underground) {
    // 地下: 岩の柱
    for (let i=0;i<8;i++) {
      const rx=((i*180-camera.x*0.1)%(W+200)+W+200)%(W+200)-100;
      ctx.fillRect(rx, 0, 20, 60+i*8);
    }
  } else if (theme.desert) {
    // 砂漠: 砂丘
    for (let i=0;i<5;i++) {
      const mx=((i*260-camera.x*0.12)%(W+300)+W+300)%(W+300)-130;
      ctx.beginPath();
      ctx.moveTo(mx,H); ctx.quadraticCurveTo(mx+90,H-60,mx+180,H);
      ctx.fill();
    }
  } else if (theme.snow) {
    // 雪: 遠くの雪山
    for (let i=0;i<5;i++) {
      const mx=((i*270-camera.x*0.12)%(W+300)+W+300)%(W+300)-135;
      ctx.beginPath();
      ctx.moveTo(mx,H); ctx.lineTo(mx+70,H-120); ctx.lineTo(mx+140,H);
      ctx.fill();
    }
    // 雪のちらつき
    ctx.fillStyle='rgba(255,255,255,0.6)';
    for (let i=0;i<20;i++) {
      const sx=((i*113.7+Date.now()*0.03)%W);
      const sy=((i*79.3+Date.now()*0.05)%H);
      ctx.beginPath(); ctx.arc(sx,sy,2,0,Math.PI*2); ctx.fill();
    }
  } else if (theme.castle) {
    // 城: 城のシルエット
    for (let i=0;i<4;i++) {
      const cx=((i*250-camera.x*0.1)%(W+280)+W+280)%(W+280)-140;
      ctx.fillRect(cx, H-90, 80, 90);
      ctx.fillRect(cx+10, H-110, 15, 20);
      ctx.fillRect(cx+30, H-115, 20, 25);
      ctx.fillRect(cx+55, H-110, 15, 20);
    }
  } else {
    // 通常: 山
    for (let i=0;i<5;i++) {
      const mx=((i*280-camera.x*0.15)%(W+300)+W+300)%(W+300)-150;
      ctx.beginPath();
      ctx.moveTo(mx,H); ctx.lineTo(mx+80,H-100); ctx.lineTo(mx+160,H);
      ctx.fill();
    }
  }

  // 雲・浮遊物(テーマ別)
  ctx.fillStyle = theme.cloudColor;
  for (let i=0;i<6;i++) {
    const cx=((i*230-camera.x*0.28)%(W+250)+W+250)%(W+250)-100;
    if (theme.underground) {
      // 地下: コウモリ風
      ctx.beginPath();
      ctx.ellipse(cx+15, 80+(i%3)*30, 12, 6, 0, 0, Math.PI*2); ctx.fill();
    } else {
      drawCloud(cx, 50+(i%2)*35);
    }
  }

  ctx.save();
  ctx.translate(-Math.round(camera.x),0);

  // タイル
  for (const t of world.tiles) drawTile(t);
  // バウンスアニメ
  for (const b of bounceBlocks) {
    ctx.save(); ctx.translate(0,b.offset);
    if (b.blockType === 'itemBlock') {
      ctx.fillStyle='#3a7d44'; ctx.fillRect(b.x,b.y,TILE,TILE);
      ctx.strokeStyle='#1f4d28'; ctx.strokeRect(b.x+1,b.y+1,TILE-2,TILE-2);
    } else {
      ctx.fillStyle='#b5651d'; ctx.fillRect(b.x,b.y,TILE,TILE);
      ctx.strokeStyle='#7a4316'; ctx.strokeRect(b.x+1,b.y+1,TILE-2,TILE-2);
    }
    ctx.restore();
  }
  // コイン
  for (const c of world.coinsTiles) { if(!c.taken) drawCoin(c.x,c.y); }
  // アイテム
  for (const it of world.items) { if(!it.taken) drawItem(it); }
  // ゴール旗
  if (world.goal) drawGoal(world.goal.x,world.goal.y);
  // 敵
  for (const e of world.enemies) { if(e.alive) drawEnemy(e); }
  // ファイアボール
  for (const fb of fireballs) { drawFireball(fb); }
  // 敵の弾
  for (const ep of enemyProjectiles) { if(ep.alive) drawEnemyProjectile(ep); }
  // パーティクル
  for (const p of particles) {
    ctx.globalAlpha=Math.max(0,p.life/35);
    ctx.fillStyle=p.color; ctx.fillRect(p.x-3,p.y-3,6,6);
    ctx.globalAlpha=1;
  }
  // 浮き文字
  for (const ft of floatTexts) {
    ctx.globalAlpha=Math.min(1,ft.life/20);
    ctx.fillStyle=ft.color; ctx.font='bold 14px sans-serif';
    ctx.textAlign='center'; ctx.fillText(ft.text,ft.x,ft.y);
    ctx.globalAlpha=1;
  }
  // プレイヤー
  if (gameState==='playing'||gameState==='paused-clear') {
    const show = player.deadAnim>0 || player.invuln===0 || Math.floor(player.invuln/4)%2===0;
    if (show) drawPlayer(player.x,player.y,player.facing);
  }

  ctx.restore();

  // HUD(パワー状態 + テーマ名)
  if (player.power==='fire') powerEl.textContent='🌀 手裏剣';
  else if (player.power==='big') powerEl.textContent='🍄 ビッグ';
  else powerEl.textContent='';
  if (player.starTimer>0) powerEl.textContent+=' ⭐無敵';
  // 手裏剣ボタンは手裏剣状態の時だけ表示(タッチデバイスのみ、CSSのpointer:coarse判定と併用)
  btnFireEl.style.display = (player.power==='fire') ? 'flex' : 'none';
  stageNumEl.textContent = (stageIndex+1) + ' ' + theme.name;
}

// ===== 個別描画関数 =====
function drawCloud(x,y) {
  ctx.beginPath();
  ctx.arc(x,y,18,0,Math.PI*2);
  ctx.arc(x+20,y-8,22,0,Math.PI*2);
  ctx.arc(x+42,y,18,0,Math.PI*2);
  ctx.fill();
}

function drawTile(t) {
  const theme = stageThemes[stageIndex] || stageThemes[0];
  // テーマ別の地面/ブロック色
  const blockColors = {
    main: theme.underground ? '#445566' : theme.desert ? '#c2922a' : theme.snow ? '#889aaa' : theme.castle ? '#443344' : (theme.stars ? '#3a3a5a' : '#8b5a2b'),
    light: theme.underground ? '#556677' : theme.desert ? '#d4a43c' : theme.snow ? '#aabbcc' : theme.castle ? '#554455' : (theme.stars ? '#4a4a6a' : '#a06c3a'),
    dark: theme.underground ? '#334455' : theme.desert ? '#a07820' : theme.snow ? '#667788' : theme.castle ? '#332233' : (theme.stars ? '#2a2a4a' : '#5c3a1a'),
  };
  if (t.type==='block') {
    ctx.fillStyle=blockColors.main; ctx.fillRect(t.x,t.y,TILE,TILE);
    ctx.fillStyle=blockColors.light; ctx.fillRect(t.x+2,t.y+2,TILE-4,TILE-4);
    ctx.strokeStyle=blockColors.dark; ctx.lineWidth=1; ctx.strokeRect(t.x+.5,t.y+.5,TILE-1,TILE-1);
    // 地面の最上段だけ草/砂/雪色にする
    if (t.y === 8*TILE) { // 地面行(row 8)
      const topColor = theme.underground?'#445566': theme.desert?'#e8b84a': theme.snow?'#eef4ff': theme.castle?'#332233': theme.stars?'#2a2a4a':'#4a9e3f';
      ctx.fillStyle=topColor; ctx.fillRect(t.x,t.y,TILE,5);
    }
  } else if (t.type==='brick') {
    ctx.fillStyle='#c0392b'; ctx.fillRect(t.x,t.y,TILE,TILE);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(t.x,t.y+TILE/2); ctx.lineTo(t.x+TILE,t.y+TILE/2);
    ctx.moveTo(t.x+TILE/2,t.y); ctx.lineTo(t.x+TILE/2,t.y+TILE/2);
    ctx.moveTo(t.x+TILE/4,t.y+TILE/2); ctx.lineTo(t.x+TILE/4,t.y+TILE);
    ctx.moveTo(t.x+TILE*3/4,t.y+TILE/2); ctx.lineTo(t.x+TILE*3/4,t.y+TILE);
    ctx.stroke();
  } else if (t.type==='coinblock' || t.type==='itemblock') {
    // アイテムブロック・コインブロックの見た目(竹をイメージした独自デザイン)
    ctx.fillStyle=t.used?'#6b5b47':'#3a7d44'; ctx.fillRect(t.x,t.y,TILE,TILE);
    ctx.strokeStyle='#1f4d28'; ctx.strokeRect(t.x+.5,t.y+.5,TILE-1,TILE-1);
    if (!t.used) {
      // 竹の節っぽい横線装飾
      ctx.strokeStyle='#2a5c34'; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(t.x+4, t.y+8); ctx.lineTo(t.x+TILE-4, t.y+8);
      ctx.moveTo(t.x+4, t.y+TILE-8); ctx.lineTo(t.x+TILE-4, t.y+TILE-8);
      ctx.stroke();
      // 竹の葉マーク(中央)
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.moveTo(t.x+TILE/2, t.y+9);
      ctx.quadraticCurveTo(t.x+TILE-8, t.y+TILE/2, t.x+TILE/2, t.y+TILE-9);
      ctx.quadraticCurveTo(t.x+8, t.y+TILE/2, t.x+TILE/2, t.y+9);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#2a5c34'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(t.x+TILE/2, t.y+9); ctx.lineTo(t.x+TILE/2, t.y+TILE-9);
      ctx.stroke();
    }
  } else if (t.type==='spike') {
    ctx.fillStyle='#888'; ctx.beginPath();
    ctx.moveTo(t.x,t.y+TILE); ctx.lineTo(t.x+TILE/2,t.y+8); ctx.lineTo(t.x+TILE,t.y+TILE);
    ctx.closePath(); ctx.fill();
  } else if (t.type==='bossWall') {
    // ボス戦の魔法障壁(倒すまで通れない・脈動するエフェクト)
    const pulse = 0.5 + 0.5*Math.sin(Date.now()/200);
    ctx.fillStyle = `rgba(150,20,180,${0.5+pulse*0.3})`;
    ctx.fillRect(t.x,t.y,TILE,TILE);
    ctx.strokeStyle = `rgba(255,100,255,${0.6+pulse*0.4})`;
    ctx.lineWidth = 2;
    ctx.strokeRect(t.x+2,t.y+2,TILE-4,TILE-4);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i=0;i<3;i++) {
      const yy = t.y + ((Date.now()/8 + i*20) % TILE);
      ctx.fillRect(t.x, yy, TILE, 2);
    }
  }
}

function drawCoin(x,y) {
  const bob=Math.sin(Date.now()/150+x)*3;
  ctx.fillStyle='#ffd54a'; ctx.beginPath();
  ctx.ellipse(x,y+bob,9,11,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#c79a1e'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff3c4'; ctx.beginPath();
  ctx.ellipse(x-2,y+bob-2,3,4,0,0,Math.PI*2); ctx.fill();
}

function drawItem(it) {
  const {x,y}=it;
  if (it.type==='mushroom') {
    ctx.fillStyle='#e8722c'; ctx.beginPath();
    ctx.arc(x+14,y+12,13,Math.PI,0); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.arc(x+7,y+8,3,0,Math.PI*2); ctx.arc(x+21,y+8,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f4d6a0'; ctx.fillRect(x+7,y+13,14,13);
    ctx.fillStyle='#222'; ctx.beginPath();
    ctx.arc(x+11,y+18,2,0,Math.PI*2); ctx.arc(x+17,y+18,2,0,Math.PI*2); ctx.fill();
  } else if (it.type==='flower') {
    // 手裏剣の巻物(忍術の巻物をイメージしたアイテム)
    ctx.fillStyle='#c0392b'; ctx.fillRect(x+6,y+4,16,20);
    ctx.fillStyle='#8b1a1a'; ctx.fillRect(x+6,y+4,16,3); ctx.fillRect(x+6,y+21,16,3);
    ctx.strokeStyle='#5a0f0f'; ctx.lineWidth=1;
    ctx.strokeRect(x+6,y+4,16,20);
    // 中央に手裏剣マーク
    ctx.save();
    ctx.translate(x+14,y+14);
    ctx.rotate(Date.now()/300);
    ctx.fillStyle='#f0d060';
    ctx.beginPath();
    for (let i=0;i<4;i++) {
      const a1=i*Math.PI/2, a2=a1+Math.PI/4;
      ctx.lineTo(Math.cos(a1)*6, Math.sin(a1)*6);
      ctx.lineTo(Math.cos(a2)*2, Math.sin(a2)*2);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (it.type==='star') {
    const cx=x+14,cy=y+14,r=13,rot=Date.now()/200;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
    ctx.fillStyle='#ffe34a'; ctx.strokeStyle='#c79a1e'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for (let i=0;i<5;i++) {
      const a1=(i*2*Math.PI/5)-Math.PI/2, a2=a1+Math.PI/5;
      ctx.lineTo(Math.cos(a1)*r,Math.sin(a1)*r);
      ctx.lineTo(Math.cos(a2)*(r*.45),Math.sin(a2)*(r*.45));
    }
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
  }
}

function drawEnemy(e) {
  const {x,y} = e;
  const S = e.kind==='boss' ? BSIZE : ESIZE;
  const cx = x + S/2, cy = y + S/2; // 中心
  const squished = e.squished > 0;
  ctx.save();

  if (e.kind === 'shooter') {
    // 手裏剣忍者: 黒装束の固定砲台タイプ、手裏剣を投げてくる
    if (squished) {
      ctx.fillStyle = '#2a2a35';
      ctx.beginPath(); ctx.ellipse(cx, y+S-6, S/2, 6, 0, 0, Math.PI*2); ctx.fill();
    } else {
      const facing = e.facing || -1;
      // 体(黒装束)
      ctx.fillStyle = '#2a2a35';
      ctx.beginPath();
      ctx.moveTo(cx-S/2+4, y+S);
      ctx.lineTo(cx-S/2+6, cy+2);
      ctx.quadraticCurveTo(cx, cy-S/2+2, cx+S/2-6, cy+2);
      ctx.lineTo(cx+S/2-4, y+S);
      ctx.closePath(); ctx.fill();
      // 頭巾(顔まわりの布)
      ctx.fillStyle = '#1a1a22';
      ctx.beginPath(); ctx.ellipse(cx, y+S/2-6, S/2-6, S/2-8, 0, 0, Math.PI*2); ctx.fill();
      // 頭巾の後ろ布(なびく)
      ctx.beginPath();
      ctx.moveTo(cx - facing*(S/2-8), y+S/2-10);
      ctx.lineTo(cx - facing*(S/2+2), y+S/2-2);
      ctx.lineTo(cx - facing*(S/2-6), y+S/2+2);
      ctx.closePath(); ctx.fill();
      // 目の隙間(鋭い目つき)
      const eo = facing>0 ? 2 : -2;
      ctx.fillStyle = '#e8edf2';
      ctx.beginPath();
      ctx.moveTo(cx-7+eo, y+S/2-8); ctx.lineTo(cx-1+eo, y+S/2-6); ctx.lineTo(cx-7+eo, y+S/2-4);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx+7+eo, y+S/2-8); ctx.lineTo(cx+1+eo, y+S/2-6); ctx.lineTo(cx+7+eo, y+S/2-4);
      ctx.closePath(); ctx.fill();
      // 手に構えた手裏剣(発射方向に構える)
      const handX = cx + facing*(S/2-4);
      ctx.save();
      ctx.translate(handX, cy+4);
      ctx.rotate(Date.now()/150);
      ctx.fillStyle = '#8a95a0';
      ctx.beginPath();
      for (let i=0;i<4;i++) {
        const a1=i*Math.PI/2, a2=a1+Math.PI/4;
        ctx.lineTo(Math.cos(a1)*7, Math.sin(a1)*7);
        ctx.lineTo(Math.cos(a2)*2.5, Math.sin(a2)*2.5);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  } else if (e.kind === 'boss') {
    // ボス: 大きい赤黒のドラゴン風、体力バー付き
    const flash = e.hitFlash > 0;
    ctx.fillStyle = flash ? '#ffaaaa' : '#8b1a1a';
    ctx.beginPath(); ctx.ellipse(cx, cy+4, S/2-4, S/2-8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#4a0a0a'; ctx.lineWidth = 3; ctx.stroke();
    // トゲトゲの背中
    ctx.fillStyle = '#5a0f0f';
    for (let i=-2;i<=2;i++) {
      ctx.beginPath();
      ctx.moveTo(cx+i*12-6, y+10);
      ctx.lineTo(cx+i*12, y-4);
      ctx.lineTo(cx+i*12+6, y+10);
      ctx.closePath(); ctx.fill();
    }
    // 目(怒った感じ)
    const eyeDir = e.vx < 0 ? -1 : 1;
    ctx.fillStyle = '#fff'; ctx.beginPath();
    ctx.ellipse(cx+eyeDir*10, cy-8, 7, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff0000'; ctx.beginPath();
    ctx.arc(cx+eyeDir*12, cy-8, 3, 0, Math.PI*2); ctx.fill();
    // 牙
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx-8, cy+S/2-12); ctx.lineTo(cx-4, cy+S/2-2); ctx.lineTo(cx, cy+S/2-12);
    ctx.fill();
    // 体力バー(頭上に表示)
    const barW = S; const barH = 6;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y-14, barW, barH);
    ctx.fillStyle = e.hp > e.maxHp/2 ? '#4ee08a' : '#ff5555';
    ctx.fillRect(x, y-14, barW*(e.hp/e.maxHp), barH);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(x, y-14, barW, barH);
  } else if (e.kind === 'koopa') {
    if (squished) {
      // つぶれた甲羅
      ctx.fillStyle = '#2e8b2e';
      ctx.beginPath(); ctx.ellipse(cx, y+S-6, S/2, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 2; ctx.stroke();
    } else {
      // 甲羅(楕円)
      ctx.fillStyle = '#2e8b2e';
      ctx.beginPath(); ctx.ellipse(cx, cy+2, S/2-2, S/2-4, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 1.5; ctx.stroke();
      // 甲羅の格子
      ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, y+4); ctx.lineTo(cx, y+S-4);
      ctx.moveTo(x+4, cy+2); ctx.lineTo(x+S-4, cy+2);
      ctx.stroke();
      // 頭
      ctx.fillStyle = '#7ac97a';
      ctx.beginPath(); ctx.ellipse(x+S-6, y+8, 9, 8, 0, 0, Math.PI*2); ctx.fill();
      // 目
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x+S-4, y+6, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(x+S-3, y+6, 1.5, 0, Math.PI*2); ctx.fill();
      // 足
      ctx.fillStyle = '#7ac97a';
      ctx.fillRect(x+4, y+S-8, 9, 6); ctx.fillRect(x+S-13, y+S-8, 9, 6);
    }
  } else if (e.kind === 'jumper') {
    if (squished) {
      ctx.fillStyle = '#cc2200';
      ctx.beginPath(); ctx.ellipse(cx, y+S-6, S/2, 6, 0, 0, Math.PI*2); ctx.fill();
    } else {
      const air = e.vy < -1;
      ctx.fillStyle = '#e03010';
      ctx.beginPath();
      ctx.ellipse(cx, cy, air ? 13 : S/2-2, air ? S/2-1 : 13, 0, 0, Math.PI*2);
      ctx.fill();
      // 目
      const eyeY = air ? y+10 : cy-4;
      ctx.fillStyle = '#fff'; ctx.beginPath();
      ctx.ellipse(cx-8, eyeY, 4, 5, 0, 0, Math.PI*2);
      ctx.ellipse(cx+8, eyeY, 4, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath();
      ctx.arc(cx-8, eyeY+1, 2, 0, Math.PI*2);
      ctx.arc(cx+8, eyeY+1, 2, 0, Math.PI*2); ctx.fill();
      // バネ足
      ctx.strokeStyle = '#aa1800'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx-8, y+S-4); ctx.lineTo(cx-10, y+S+1);
      ctx.moveTo(cx+8, y+S-4); ctx.lineTo(cx+10, y+S+1);
      ctx.stroke();
    }
  } else {
    // たけまる(竹の妖精、丸っこい緑のオリジナルモンスター)
    if (squished) {
      ctx.fillStyle = '#4a8f4a';
      ctx.beginPath(); ctx.ellipse(cx, y+S-6, S/2, 6, 0, 0, Math.PI*2); ctx.fill();
    } else {
      // 丸い胴体(竹の節のような横縞)
      ctx.fillStyle = '#5cae5c';
      ctx.beginPath(); ctx.ellipse(cx, cy+3, S/2-1, S/2-4, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d7d3d'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx-S/2+4, cy+3); ctx.lineTo(cx+S/2-4, cy+3);
      ctx.stroke();
      // 頭頂部の葉っぱ2枚
      ctx.fillStyle = '#3d8f3d';
      ctx.beginPath();
      ctx.ellipse(cx-6, y+2, 5, 9, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx+6, y+2, 5, 9, 0.4, 0, Math.PI*2); ctx.fill();
      // 丸い目(大きめでかわいい感じ、クリボーのような吊り目にしない)
      ctx.fillStyle = '#fff'; ctx.beginPath();
      ctx.arc(cx-8, cy-1, 6, 0, Math.PI*2);
      ctx.arc(cx+8, cy-1, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222'; ctx.beginPath();
      ctx.arc(cx-7, cy, 3, 0, Math.PI*2);
      ctx.arc(cx+9, cy, 3, 0, Math.PI*2); ctx.fill();
      // ほっぺ
      ctx.fillStyle = 'rgba(255,150,150,0.5)'; ctx.beginPath();
      ctx.ellipse(cx-11, cy+7, 3, 2, 0, 0, Math.PI*2);
      ctx.ellipse(cx+11, cy+7, 3, 2, 0, 0, Math.PI*2); ctx.fill();
      // 足(小さい丸)
      ctx.fillStyle = '#3d7d3d';
      ctx.beginPath();
      ctx.ellipse(x+8, y+S-4, 6, 4, 0, 0, Math.PI*2);
      ctx.ellipse(x+S-8, y+S-4, 6, 4, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // つぶれた目(×) koopa/shooter/boss以外
  if (squished && e.kind !== 'koopa' && e.kind !== 'shooter') {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx-10, cy); ctx.lineTo(cx-5, cy+5);
    ctx.moveTo(cx-5, cy); ctx.lineTo(cx-10, cy+5);
    ctx.moveTo(cx+5, cy); ctx.lineTo(cx+10, cy+5);
    ctx.moveTo(cx+10, cy); ctx.lineTo(cx+5, cy+5);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemyProjectile(ep) {
  ctx.save();
  if (ep.kind === 'fireboss') {
    // 進行方向に伸びる炎の尾を描いて速度感を出す
    const angle = Math.atan2(ep.vy, ep.vx);
    ctx.save();
    ctx.translate(ep.x, ep.y);
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(255,80,0,0.5)';
    ctx.beginPath(); ctx.ellipse(-10,0,14,6,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ff3300';
    ctx.beginPath(); ctx.arc(ep.x, ep.y, 11, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(ep.x-2, ep.y-2, 6, 0, Math.PI*2); ctx.fill();
  } else {
    // rock(忍者の投げる手裏剣)
    ctx.save();
    ctx.translate(ep.x, ep.y);
    ctx.rotate(Date.now()/50);
    ctx.fillStyle = '#8a95a0';
    ctx.beginPath();
    for (let i=0;i<4;i++) {
      const a1=i*Math.PI/2, a2=a1+Math.PI/4;
      ctx.lineTo(Math.cos(a1)*9, Math.sin(a1)*9);
      ctx.lineTo(Math.cos(a2)*3, Math.sin(a2)*3);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#3a4550'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#3a4550';
    ctx.beginPath(); ctx.arc(0,0,2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawFireball(fb) {
  ctx.save();
  ctx.translate(fb.x, fb.y);
  ctx.rotate(Date.now()/60); // くるくる回転
  ctx.fillStyle = '#5a6a7a';
  ctx.beginPath();
  for (let i=0;i<4;i++) {
    const a1 = i*Math.PI/2;
    const a2 = a1 + Math.PI/4;
    ctx.lineTo(Math.cos(a1)*9, Math.sin(a1)*9);
    ctx.lineTo(Math.cos(a2)*3, Math.sin(a2)*3);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#2a3540'; ctx.lineWidth = 1;
  ctx.stroke();
  // 中心の穴
  ctx.fillStyle = '#2a3540';
  ctx.beginPath(); ctx.arc(0,0,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawGoal(x,y) {
  ctx.fillStyle='#aaa'; ctx.fillRect(x+4,y,4,H-y);
  ctx.fillStyle='#2ecc71'; ctx.beginPath();
  ctx.moveTo(x+8,y+4); ctx.lineTo(x+42,y+14); ctx.lineTo(x+8,y+26);
  ctx.closePath(); ctx.fill();
  // ポール上の装飾
  ctx.fillStyle='#e63946'; ctx.beginPath();
  ctx.arc(x+6,y,8,0,Math.PI*2); ctx.fill();
}

function drawPlayer(x,y,facing) {
  ctx.save();
  const big=player.power!=='small';
  const bodyH=big?30:20, bodyY=big?y+18:y+10, legY=big?y+44:y+30;
  let furColor='#fdfdfd';
  if (player.starTimer>0) furColor=`hsl(${(Date.now()/8)%360},80%,75%)`;
  // 体
  ctx.fillStyle=furColor; ctx.fillRect(x,bodyY,26,bodyH);
  ctx.fillStyle='#222'; ctx.fillRect(x,bodyY,26,6);
  ctx.fillRect(x+2,y,6,8); ctx.fillRect(x+18,y,6,8);
  // 顔
  ctx.fillStyle=furColor; ctx.beginPath();
  ctx.arc(x+13,y+10,11,0,Math.PI*2); ctx.fill();
  // 目
  const eo=facing>0?2:-2;
  ctx.fillStyle='#222'; ctx.beginPath();
  ctx.ellipse(x+9+eo,y+9,3.2,4,0,0,Math.PI*2);
  ctx.ellipse(x+18+eo,y+9,3.2,4,0,0,Math.PI*2); ctx.fill();
  // 頬(手裏剣状態はグレー、通常はピンク)
  ctx.fillStyle=player.power==='fire'?'rgba(120,130,150,0.5)':'rgba(255,150,180,0.4)';
  ctx.beginPath();
  ctx.ellipse(x+6,y+13,3,2.2,0,0,Math.PI*2);
  ctx.ellipse(x+20,y+13,3,2.2,0,0,Math.PI*2);
  ctx.fill();
  if (big) {
    ctx.fillStyle=player.power==='fire'?'#6b7a8a':'#7ec8e3';
    ctx.fillRect(x+4,bodyY+10,18,bodyH-10);
  }
  // 死亡中はくるくる
  if (player.deadAnim>0) {
    ctx.restore(); return;
  }
  // 足(歩行アニメ)
  ctx.fillStyle='#3a3a3a';
  const step=player.onGround&&Math.abs(player.vx)>0.5 ? Math.sin(Date.now()/80)*4 : 0;
  ctx.fillRect(x+2,legY+step,9,5);
  ctx.fillRect(x+15,legY-step,9,5);
  ctx.restore();
}

// ===== メインループ =====
function loop() {
  if (gameState==='paused-clear') {
    stageClearTimer--;
    if (stageClearTimer<=0) {
      stageIndex++; loadStage(stageIndex); gameState='playing';
    }
  }
  update();
  draw();
  if (gameState==='paused-clear') {
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd54a'; ctx.font='bold 42px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('STAGE CLEAR!', W/2, H/2-30);
    ctx.fillStyle='#fff'; ctx.font='22px sans-serif';
    const nextTheme = stageThemes[stageIndex+1];
    ctx.fillText('次のステージ: ' + (nextTheme ? nextTheme.name : ''), W/2, H/2+10);
    ctx.font='16px sans-serif'; ctx.fillStyle='#aaa';
    ctx.fillText('コイン: '+coins+'枚　ライフ: '+lives, W/2, H/2+42);
  }
  requestAnimationFrame(loop);
}

loadStage(0); draw(); requestAnimationFrame(loop);
})();
</script>
